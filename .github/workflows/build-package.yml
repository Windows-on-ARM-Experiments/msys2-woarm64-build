name: Build MSYS2 package

on:
  workflow_call:
    inputs:
      package_name:
        description: "Package name to build"
        type: string
      packages_repository:
        description: "MSYS2 packages repository to build from"
        type: string
        default: "Windows-on-ARM-Experiments/MSYS2-packages"
      packages_branch:
        description: "MSYS2 packages branch to build from"
        type: string
        default: "woarm64"
      runner_arch:
        description: "Architecture to build on"
        type: string
        default: "x86_64"
      cross_build:
        description: "Use MSYS2 -> MINGW cross-compiler"
        type: boolean
        default: false
      needs:
        description: "Parent workflow job dependencies"
        type: string
      dependencies:
        description: "Install additional dependencies"
        type: string
        default: ""
      check:
        description: "Enable check step after the package is built"
        type: boolean
        default: false
      check_module:
        description: "Module to test"
        type: string
        default: ""
      check_filter:
        description: "Test filter"
        type: string
        default: ""

defaults:
  run:
    shell: msys2 {0}

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CROSS_BUILD: ${{ inputs.cross_build && '1' || '0' }}
  MODULE: ${{ inputs.check_module }}
  FILTER: ${{ inputs.check_filter }}

jobs:
  build:
    name: Build ${{ inputs.package_name }}
    runs-on: >-
      ${{ fromJson(inputs.runner_arch == 'aarch64'
        && '["Windows", "ARM64", "Blackhex"]'
        || (inputs.check && '["Windows", "X64", "GCC"]' || '["windows-latest"]')
      ) }}
    timeout-minutes: ${{ inputs.check && 720 || 180 }}

    steps:
      - name: Kill hanging processes
        if: ${{ inputs.runner_arch == 'aarch64' || inputs.check }}
        shell: powershell
        run: |
          tasklist
          taskkill /F /FI 'MODULES eq msys-2.0.dll'
          tasklist
          Set-Location "${{ github.workspace }}"
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue -Path packages
          exit 0

      - name: Fix Git long paths
        if: ${{ inputs.runner_arch == 'aarch64' }}
        shell: powershell
        run: |
          git config --global core.longpaths true

      - name: Fix $PATH
        if: ${{ inputs.runner_arch == 'aarch64' || inputs.check }}
        shell: powershell
        run: |
          Write-Output "GITHUB_PATH: $env:GITHUB_PATH"
          Write-Output "C:\Program Files\Git\usr\bin\" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: Windows-on-ARM-Experiments/setup-msys2@main
        timeout-minutes: 10
        with:
          msystem: >-
            ${{ contains(inputs.packages_repository, 'MINGW')
              && ((inputs.runner_arch == 'aarch64') && 'MINGWARM64' || 'MINGW64')
              || 'MSYS' }}
          update: ${{ inputs.runner_arch == 'x86_64' }}
          cache: ${{ inputs.runner_arch == 'x86_64' }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout ${{ inputs.packages_repository }} repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.packages_repository }}
          ref: ${{ inputs.packages_branch }}
          sparse-checkout: ${{ inputs.package_name }}
          path: ${{ github.workspace }}/packages

      - name: Pacman hang workaround
        if: ${{ inputs.runner_arch == 'aarch64' }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/pacman-workaround.sh

      - name: First MSYS2 update
        if: ${{ inputs.runner_arch == 'aarch64' }}
        shell: powershell
        run: |
          msys2 -c 'pacman -Syuu --noconfirm'
          exit 0

      - name: Second MSYS2 update
        if: ${{ inputs.runner_arch == 'aarch64' }}
        shell: powershell
        run: |
          msys2 -c 'pacman -Syuu --noconfirm'

      - name: Setup packages repository
        if: ${{ inputs.runner_arch == 'aarch64' }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/setup-repository.sh

      - name: Install dependencies
        run: >-
          pacman -S --noconfirm \
            git \
            mingw-w64-x86_64-github-cli \
            mingw-w64-x86_64-jq \
            base-devel \
            ${{ contains(inputs.packages_repository, 'MINGW')
              && (inputs.cross_build
                && 'mingw-w64-cross-mingwarm64-gcc mingw-w64-cross-mingwarm64-windows-default-manifest mingw-w64-x86_64-gcc-libs'
                || 'mingw-w64-aarch64-gcc')
              || '' }} \
            ${{ inputs.check && 'dejagnu' || ''}} \
            ${{ inputs.dependencies }}

      - name: Download artifacts
        if: ${{ inputs.needs }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/download-artifacts.sh ${{ github.run_id }} '${{ inputs.needs }}'

      - name: Install artifacts
        if: ${{ inputs.needs }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/install-artifacts.sh

      - name: Copy missing headers for mingw-w64-cross-mingwarm64-crt
        if: ${{ inputs.package_name == 'mingw-w64-cross-mingwarm64-crt' }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/pthread-headers-hack-before.sh

      - name: Patch Dejagnu
        if: ${{ inputs.check }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/patch-dejagnu.sh

      - name: Patch makepkg
        if: ${{ inputs.check }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/patch-makepkg.sh

      - name: Setup MINGWARM64 environment
        if: ${{ inputs.runner_arch == 'aarch64' }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/setup-mingwarm64.sh

      - name: Enable Ccache
        id: enable-ccache
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/enable-ccache.sh

      - name: Restore Ccache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/ccache
          key: ${{ inputs.package_name }}-ccache-${{ steps.enable-ccache.outputs.timestamp }}
          restore-keys: ${{ inputs.package_name }}-

      - name: Build ${{ inputs.package_name }}
        working-directory: ${{ github.workspace }}/packages/${{ inputs.package_name }}
        env:
          CLEAN_BUILD: 1
          NO_ARCHIVE: ${{ inputs.check && '1' || '0' }}
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/build-package.sh ${{ inputs.packages_repository }}

      - name: Check ${{ inputs.package_name }}
        if: ${{ inputs.check }}
        working-directory: ${{ github.workspace }}/packages/${{ inputs.package_name }}
        env:
          NO_EXTRACT: 1
          NO_ARCHIVE: 1
        run: |
          `cygpath "${{ github.workspace }}"`/.github/scripts/check-package.sh ${{ inputs.packages_repository }}

      - name: Save Ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/ccache
          key: ${{ inputs.package_name }}-ccache-${{ steps.enable-ccache.outputs.timestamp }}

      - name: Upload ${{ inputs.package_name }}
        if: ${{ !inputs.check }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}
          retention-days: 7
          path: ${{ github.workspace }}/packages/${{ inputs.package_name }}/*.pkg.tar.zst

      - name: Upload ${{ inputs.package_name }} test results
        if: ${{ inputs.check }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-test-results
          retention-days: 14
          path: ${{ github.workspace }}/packages/${{ inputs.package_name }}/src/test-results

      - name: Upload build folder
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}-build
          retention-days: 3
          path: ${{ github.workspace }}/packages/${{ inputs.package_name }}/src
