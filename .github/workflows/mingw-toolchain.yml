name: Build MinGW toolchain

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mingw_packages_branch:
        description: "MINGW-packages branch to build"
        type: string
        required: false
        default: "woarm64"

jobs:
  mingw-w64-libiconv:
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-libiconv
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      runs_on_arm64: true

  mingw-w64-libtre-git:
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-libtre-git
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      runs_on_arm64: true

  mingw-w64-libsystre:
    needs: [
      mingw-w64-libtre-git
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-libsystre
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-ncurses:
    needs: [
      mingw-w64-libtre-git,
      mingw-w64-libsystre
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-ncurses
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-gettext:
    needs: [
      mingw-w64-libiconv,
      mingw-w64-libtre-git,
      mingw-w64-libsystre,
      mingw-w64-ncurses
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-gettext
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-headers-git:
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-headers-git
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      runs_on_arm64: true

  mingw-w64-winpthreads-git:
    needs: [
      mingw-w64-headers-git
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-winpthreads-git
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-bzip2:
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-bzip2
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      runs_on_arm64: true

  mingw-w64-zlib:
    needs: [
      mingw-w64-bzip2
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-zlib
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-zstd:
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-zstd
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      runs_on_arm64: true

  mingw-w64-gmp:
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-gmp
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      runs_on_arm64: true

  mingw-w64-mpfr:
    uses: ./.github/workflows/build-package.yml
    needs: [
      mingw-w64-gmp
    ]
    with:
      package_name: mingw-w64-mpfr
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-isl:
    uses: ./.github/workflows/build-package.yml
    needs: [
      mingw-w64-gmp
    ]
    with:
      package_name: mingw-w64-isl
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-binutils:
    needs: [
      mingw-w64-libiconv,
      mingw-w64-libtre-git,
      mingw-w64-libsystre,
      mingw-w64-ncurses,
      mingw-w64-gettext,
      mingw-w64-headers-git,
      mingw-w64-winpthreads-git,
      mingw-w64-bzip2,
      mingw-w64-zlib,
      mingw-w64-zstd,
      mingw-w64-gmp,
      mingw-w64-mpfr,
      mingw-w64-isl
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-binutils
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-mpc:
    needs: [
      mingw-w64-gmp,
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-mpc
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-crt-git:
    needs: [
      mingw-w64-libiconv,
      mingw-w64-libtre-git,
      mingw-w64-libsystre,
      mingw-w64-ncurses,
      mingw-w64-gettext,
      mingw-w64-headers-git,
      mingw-w64-winpthreads-git,
      mingw-w64-bzip2,
      mingw-w64-zlib,
      mingw-w64-zstd,
      mingw-w64-gmp,
      mingw-w64-mpfr,
      mingw-w64-isl,
      mingw-w64-binutils
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-crt-git
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true

  mingw-w64-windows-default-manifest:
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-windows-default-manifest
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      runs_on_arm64: true

  mingw-w64-gcc:
    needs: [
      mingw-w64-libiconv,
      mingw-w64-libtre-git,
      mingw-w64-libsystre,
      mingw-w64-ncurses,
      mingw-w64-gettext,
      mingw-w64-headers-git,
      mingw-w64-winpthreads-git,
      mingw-w64-bzip2,
      mingw-w64-zlib,
      mingw-w64-zstd,
      mingw-w64-gmp,
      mingw-w64-mpfr,
      mingw-w64-isl,
      mingw-w64-binutils,
      mingw-w64-mpc,
      mingw-w64-crt-git,
      mingw-w64-windows-default-manifest
    ]
    uses: ./.github/workflows/build-package.yml
    with:
      package_name: mingw-w64-gcc
      packages_repository: Windows-on-ARM-Experiments/MINGW-packages
      packages_branch: ${{ github.event.inputs.mingw_packages_branch || 'woarm64' }}
      dependencies: mingw-w64-cross-gcc
      needs: ${{ toJson(needs) }}
      runs_on_arm64: true
